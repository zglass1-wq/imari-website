<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Imari · View Stats</title>
  <style>
    :root { --ink:#1a1712; --muted:#6b6358; --line:#e6e0d6; --bg:#faf8f4; --accent:#8a6d3b; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    main { max-width: 960px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 .25rem; }
    h2 { font-size: 1rem; font-weight: 600; margin: 2.5rem 0 .75rem; letter-spacing: .02em; }
    .sub { color: var(--muted); margin: 0 0 2rem; font-size: .9rem; }
    #status { color: var(--muted); font-size: .9rem; }
    table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
    th, td { text-align: left; padding: .55rem .6rem; border-bottom: 1px solid var(--line); }
    th { font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); font-weight: 600; }
    td.num, th.num { text-align: right; }
    tbody tr:hover { background: #fff; }
    .total { font-weight: 600; }
    .events { list-style: none; margin: 0; padding: 0; }
    .events li {
      display: grid; grid-template-columns: 1fr auto; gap: .25rem 1rem;
      padding: .6rem .2rem; border-bottom: 1px solid var(--line); font-size: .88rem;
    }
    .events .page { font-weight: 600; }
    .events .when { color: var(--muted); }
    .events .geo { color: var(--accent); font-size: .82rem; grid-column: 1 / -1; }
    .empty { color: var(--muted); font-style: italic; padding: .6rem .2rem; }
    .err { color: #a23; }
    footer { margin-top: 3rem; color: var(--muted); font-size: .78rem; }
    a.logout { color: var(--accent); }
  </style>
</head>
<body>
  <main>
    <h1>Private page views</h1>
    <p class="sub">Server-side count of code-unlock accesses — unblockable, recorded at the moment a valid code routes to a page.</p>
    <p id="status">Loading…</p>

    <section id="counts-wrap" hidden>
      <h2>Per page</h2>
      <table>
        <thead>
          <tr>
            <th>Page</th>
            <th class="num">Total</th>
            <th class="num">Last 7 days</th>
          </tr>
        </thead>
        <tbody id="counts"></tbody>
      </table>
    </section>

    <section id="recent-wrap" hidden>
      <h2>Recent accesses</h2>
      <ul class="events" id="recent"></ul>
    </section>

    <footer>
      <a class="logout" href="/api/logout">Log out</a>
    </footer>
  </main>

  <script>
    (function () {
      var statusEl = document.getElementById('status');

      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
        });
      }

      function fmtTime(ts) {
        try { return new Date(ts).toLocaleString(undefined, {
          weekday: 'short', month: 'short', day: 'numeric',
          hour: 'numeric', minute: '2-digit'
        }); } catch (e) { return String(ts); }
      }

      function geoStr(ev) {
        var parts = [ev.city, ev.region, ev.country].filter(Boolean);
        return parts.join(', ');
      }

      function sumLast7(perDay) {
        var t = 0;
        for (var k in perDay) if (Object.prototype.hasOwnProperty.call(perDay, k)) t += Number(perDay[k] || 0);
        return t;
      }

      fetch('/api/stats', { credentials: 'same-origin' })
        .then(function (r) {
          if (r.status === 401) throw new Error('Not authorized — enter the stats code via /private-info.');
          if (!r.ok) throw new Error('Failed to load (' + r.status + ').');
          return r.json();
        })
        .then(function (d) {
          if (!d || !d.ok) throw new Error('Unexpected response.');

          // Counts table (sorted by total desc)
          var roles = Object.keys(d.counts || {}).sort(function (a, b) {
            return (d.counts[b] || 0) - (d.counts[a] || 0);
          });
          var tbody = document.getElementById('counts');
          if (!roles.length) {
            tbody.innerHTML = '<tr><td colspan="3" class="empty">No views recorded yet.</td></tr>';
          } else {
            tbody.innerHTML = roles.map(function (r) {
              var last7 = d.daily && d.daily[r] ? sumLast7(d.daily[r]) : 0;
              return '<tr><td>' + esc(r) + '</td>' +
                     '<td class="num total">' + (d.counts[r] || 0) + '</td>' +
                     '<td class="num">' + last7 + '</td></tr>';
            }).join('');
          }
          document.getElementById('counts-wrap').hidden = false;

          // Recent events
          var recent = d.recent || [];
          var ul = document.getElementById('recent');
          if (!recent.length) {
            ul.innerHTML = '<li class="empty">No events yet.</li>';
          } else {
            ul.innerHTML = recent.map(function (ev) {
              var geo = geoStr(ev);
              return '<li>' +
                '<span class="page">' + esc(ev.role || ev.path) + '</span>' +
                '<span class="when">' + esc(fmtTime(ev.ts)) + '</span>' +
                (geo ? '<span class="geo">' + esc(geo) + '</span>' : '') +
              '</li>';
            }).join('');
          }
          document.getElementById('recent-wrap').hidden = false;

          statusEl.hidden = true;
        })
        .catch(function (err) {
          statusEl.className = 'err';
          statusEl.textContent = err.message || 'Something went wrong.';
        });
    })();
  </script>
</body>
</html>
