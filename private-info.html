<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imari · Private Information</title>
  <link rel="icon" type="image/svg+xml" href="./logos/imari-gingko.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1712;
      --parchment: #f5f0e8;
      --gold: #b8975a;
      --gold-light: #d4b07a;
      --warm-mid: #8c7b60;
    }
    body {
      background: var(--ink);
      color: var(--parchment);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { height: 22px; width: auto; display: block; opacity: 0.85; }
    .nav-back { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--warm-mid); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--gold); }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4rem 1.5rem;
      width: 100%;
    }
    .gate-inner { text-align: center; max-width: 460px; width: 100%; }
    .eyebrow { font-size: 0.58rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; display: block; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.4rem);
      font-weight: 300;
      line-height: 1.15;
      color: var(--parchment);
      margin-bottom: 1.75rem;
    }
    .page-title em { font-style: italic; color: var(--gold-light); }
    .rule { width: 40px; height: 1px; background: var(--gold); margin: 0 auto 2rem; opacity: 0.6; }
    .page-desc {
      font-size: 0.85rem;
      line-height: 1.85;
      color: rgba(245,240,232,0.55);
      margin-bottom: 3rem;
    }
    .gate-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(184,151,90,0.35);
      padding: 0.85rem 0;
      color: var(--parchment);
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-align: center;
      outline: none;
      transition: border-color 0.3s;
    }
    .gate-input::placeholder { color: rgba(245,240,232,0.25); }
    .gate-input:focus { border-color: var(--gold); }
    .gate-btn {
      width: 100%;
      margin-top: 1.75rem;
      padding: 1rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, opacity 0.2s;
    }
    .gate-btn:hover { background: var(--gold); color: var(--ink); }
    .gate-btn:disabled { opacity: 0.5; cursor: wait; }
    .gate-error { margin-top: 1.25rem; font-size: 0.68rem; letter-spacing: 0.12em; color: rgba(184,151,90,0.65); min-height: 1em; text-transform: uppercase; }

    .access-note {
      font-size: 0.72rem;
      line-height: 1.85;
      color: rgba(245,240,232,0.25);
      max-width: 420px;
      text-align: center;
      margin: 3.5rem auto 0;
    }
    .access-note a { color: var(--gold); opacity: 0.7; text-decoration: none; transition: opacity 0.2s; }
    .access-note a:hover { opacity: 1; }

    footer {
      padding: 1.5rem 3rem;
      border-top: 1px solid rgba(184,151,90,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-logo { height: 16px; opacity: 0.3; }
    .footer-copy { font-size: 0.55rem; letter-spacing: 0.12em; color: rgba(245,240,232,0.15); text-transform: uppercase; }

    @media (max-width: 768px) {
      nav { padding: 1.5rem; }
      main { padding: 3rem 1.5rem; }
      footer { padding: 1.5rem; flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <img class="nav-logo" src="./logos/imari-parchment.svg" alt="Imari" onerror="this.style.display='none'" />
    <a href="./imari-website.html" class="nav-back">← Back</a>
  </nav>

  <main>
    <div class="gate-inner">
      <span class="eyebrow">Private Information</span>
      <h1 class="page-title">The private side<br>of <em>Imari.</em></h1>
      <div class="rule"></div>
      <p class="page-desc">Enter your access code below.</p>

      <form id="gate-form" autocomplete="off">
        <input id="pw-input" class="gate-input" type="password" placeholder="Access code" autocomplete="off" autofocus />
        <button id="gate-btn" class="gate-btn" type="submit">Enter</button>
        <p class="gate-error" id="gate-error">&nbsp;</p>
      </form>

      <p class="access-note">If you don't have an access code, <a href="mailto:info@lxivgroup.com">contact us</a> and we'll be in touch promptly.</p>
    </div>
  </main>

  <footer>
    <img class="footer-logo" src="./logos/imari-parchment.svg" alt="Imari" onerror="this.style.display='none'" />
    <span class="footer-copy">© 2025 LXIV Group · Confidential</span>
  </footer>

  <script>
    const form = document.getElementById('gate-form');
    const input = document.getElementById('pw-input');
    const btn = document.getElementById('gate-btn');
    const err = document.getElementById('gate-error');

    function showError(message) {
      err.textContent = message;
      input.value = '';
      input.focus();
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const password = input.value.trim();
      if (!password) return;

      btn.disabled = true;
      err.textContent = ' ';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok && data.ok && data.redirect) {
          window.location.replace(data.redirect);
          return;
        }

        if (res.status === 401) {
          showError('Incorrect access code.');
        } else {
          showError('Unable to verify code. Try again.');
        }
      } catch {
        showError('Network error. Try again.');
      } finally {
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
